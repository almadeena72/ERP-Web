<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<link rel="stylesheet" href="css/style.css">

<style>

.error-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.error-page h1{
    font-size:120px;
    color:#0b5d3b;
}

.error-page h2{
    margin:20px 0;
}

.error-page p{
    color:#666;
    margin-bottom:30px;
}

.error-page .btn{
    text-decoration:none;
}

</style>

</head>

<body>

<section class="error-page">

<div>

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

The page you are looking for doesn't exist.

</p>

<a href="index.html" class="btn">

Back to Home

</a>

</div>

</section>

</body>

</html>
